services:
  ollama-server:
    image: ollama/ollama:${OLLAMA_VERSION:-0.24.0}
    container_name: ollama-server
    shm_size: '16gb'
#    entrypoint: ["/bin/sh", "/app/scripts/entrypoint.ollama.sh"]
    ulimits:
      memlock: -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_ID:-0}"]
              capabilities: [gpu]
    ports:
      - 11434:11434
    volumes:
      - ${MODELS:-./models}:/models
      - ./workspace:/app/workspace
      - ./scripts/entrypoint.ollama.sh:/app/scripts/entrypoint.ollama.sh:ro
    networks:
      - ollama-bridge
    restart: always
    environment:
      OLLAMA_MODELS: /models
      OLLAMA_KV_CACHE_TYPE: q8_0 # can be: f16, q8_0, q4_0
      OLLAMA_FLASH_ATTENTION: 1
      OLLAMA_MAX_LOADED_MODELS: 2
      OLLAMA_NUM_PARALLEL: 4
      OLLAMA_KEEP_ALIVE: 24h
    # dns:
    #   - 8.8.8.8      # Google Primary Public DNS
    #   - 1.1.1.1      # Cloudflare Secondary Public DNS

  anythingllm:
    image: mintplexlabs/anythingllm:${ANYTHINGLLM_VERSION:-1.12.1}
    container_name: anythingllm
    ports:
    - "3001:3001"
    cap_add:
      - SYS_ADMIN
    environment:
    # Adjust for your environment
      - STORAGE_DIR=/app/server/storage
      - JWT_SECRET="anythingllm_jwt_secret"
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_PATH=http://ollama-server:11434
      - OLLAMA_MODEL_PREF=llama3.2 # llama2, llama3.2, llava
      - OLLAMA_MODEL_TOKEN_LIMIT=4096
      - OLLAMA_CONTEXT_LENGTH=8192
      - EMBEDDING_ENGINE=ollama
      - EMBEDDING_BASE_PATH=http://ollama-server:11434
      - EMBEDDING_MODEL_PREF=llava # nomic-embed-text:latest
      - EMBEDDING_MODEL_MAX_CHUNK_LENGTH=8192
      - VECTOR_DB=lancedb
      - WHISPER_PROVIDER=local
      - TTS_PROVIDER=native
      - PASSWORDMINCHAR=8
      # Add any other keys here for services or settings
    volumes:
      - ${DATA_DIR:-./data}/anythingllm_storage:/app/server/storage
    networks:
      - ollama-bridge
    restart: always
    depends_on:
      - ollama-server


  open-webui:
    image: ghcr.io/open-webui/open-webui:${OW_VERSION:-v0.8.11}
    container_name: open-webui
    ports:
    - "3002:8080"
    cap_add:
      - SYS_ADMIN
    environment:
    # Adjust for your environment
      - OLLAMA_BASE_URL=http://ollama-server:11434
      # Add any other keys here for services or settings
    volumes:
      - ${DATA_DIR:-./data}/open-webui:/app/backend/data
    networks:
      - ollama-bridge
    restart: always
    depends_on:
      - ollama-server

networks:
  ollama-bridge:
    driver: bridge
