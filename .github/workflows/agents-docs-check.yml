name: Agents Docs Check

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - ".github/agents/**"
      - "tools/check_agent_docs.py"
      - "tests/test_agent_docs_check.py"
      - ".github/workflows/agents-docs-check.yml"
  push:
    paths:
      - "AGENTS.md"
      - ".github/agents/**"
      - "tools/check_agent_docs.py"
      - "tests/test_agent_docs_check.py"
      - ".github/workflows/agents-docs-check.yml"

jobs:
  validate-agents-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Verify agent routing docs and tests
        run: |
          make verify-agent-routing

