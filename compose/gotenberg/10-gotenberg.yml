services:
  gotenberg:
    image: ${GOTENBERG_IMAGE:-gotenberg/gotenberg:8}
    container_name: gotenberg
    restart: unless-stopped
    ports:
      - "${GOTENBERG_PORT:-3010}:3000"
    volumes:
      - gotenberg-data:/data
    networks:
      - gotenberg-network
    # Gotenberg runs Chromium and LibreOffice headless internally.
    # We disable the built-in webhook (not needed locally) and set
    # a generous timeout for large DOCX files.
    # Chromium needs web security disabled for cross-origin resources.
    # The /data volume handles persistent storage (no --storage-driver-directory flag in v8).
    command: ["gotenberg", "--chromium-disable-web-security=true"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
