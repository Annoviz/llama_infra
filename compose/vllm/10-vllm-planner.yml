services:
  vllm-planner:
    build:
      network: host
      context: .
      dockerfile: compose/vllm/Dockerfile.vllm
      args:
        VLLM_VERSION: ${VLLM_VERSION:-v0.25.0-cu129-ubuntu2404}
        HUGGINGFACE_HUB_VERSION: ${HUGGINGFACE_HUB_VERSION:-0.35.0}
    image: ${REGISTRY:-llama-infra-vllm}/vllm:${VLLM_VERSION:-v0.25.0-cu129-ubuntu2404}
    container_name: vllm-planner
    shm_size: "16gb"
    ulimits:
      memlock: -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_ID:-0}"]
              capabilities: [gpu]
    volumes:
      - ${MODELS:-./models}/vllm:/root/.cache/huggingface
    networks:
      - vllm-bridge
      - ollama-bridge
    restart: always
    environment:
      HF_TOKEN: "${HF_TOKEN}"
      HUGGING_FACE_HUB_TOKEN: "${HF_TOKEN}"
      HF_HOME: "/root/.cache/huggingface"
      VLLM_MODEL_REPO: "Qwen/Qwen3.6-35B-A3B-FP8"
      VLLM_SERVED_NAME: "planner"
      VLLM_MAX_LEN: "16384"
      VLLM_GPU_MEM: "0.92"
      VLLM_EXTRA_FLAGS: "--mm-encoder-tp-mode data --reasoning-parser qwen3 --trust-remote-code --enable-chunked-prefill --max-num-seqs 256 --kv-cache-dtype fp8"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
