services:
  _vllm-engine-base:
    build:
      context: .
      dockerfile: compose/vllm/Dockerfile.vllm
      args:
        VLLM_VERSION: ${VLLM_VERSION:-0.25.0-cu129-ubuntu2404}
        HUGGINGFACE_HUB_VERSION: ${HUGGINGFACE_HUB_VERSION:-0.35.0}
    image: ${REGISTRY:-llama-infra-vllm}/vllm:${VLLM_VERSION:-0.25.0-cu129-ubuntu2404}
    shm_size: "16gb"
    ulimits:
      memlock: -1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_ID:-0}"]
              capabilities: [gpu]
    volumes:
      - ${MODELS:-./models}/vllm:/root/.cache/huggingface
    networks:
      - vllm-bridge
      - ollama-bridge  # cross-stack for gateway/WUI routing
    restart: always
    environment:
      HF_TOKEN: "${HF_TOKEN}"
      HUGGING_FACE_HUB_TOKEN: "${HF_TOKEN}"
      HF_HOME: "/root/.cache/huggingface"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
