services:
  vllm-download-planner:
    image: ${REGISTRY:-llama-infra-vllm}/vllm:${VLLM_VERSION:-0.25.0-cu129-ubuntu2404}
    container_name: vllm-dl-planner
    environment:
      HF_TOKEN: "${HF_TOKEN}"
      HUGGING_FACE_HUB_TOKEN: "${HF_TOKEN}"
      VLLM_MODEL_REPO: "Qwen/Qwen3.6-35B-A3B-FP8"
    volumes:
      - ${MODELS:-./models}/vllm:/root/.cache/huggingface
    entrypoint: ["sh", "-c"]
    command:
      - |
        python3 -c "
        from huggingface_hub import scan_cache_dir, snapshot_download
        cache = scan_cache_dir()
        repos = {r.repo_id for r in cache.repos}
        target = 'Qwen/Qwen3.6-35B-A3B-FP8'
        if target not in repos:
            print(f'[download] Downloading {target}...')
            snapshot_download(repo_id=target, repo_type='model')
            print('[download] Complete.')
        else:
            print(f'[download] {target} already cached — skipping.')
        "
    profiles: ["download"]

