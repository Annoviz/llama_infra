# llama.cpp router stack — LiteLLM gateway (Ollama API on port 11434)

services:
  llamacpp-gateway:
    image: ghcr.io/berriai/litellm:${LITELLM_VERSION:-1.92.0}
    container_name: llamacpp-gateway
    ports:
      - "${VLLM_GATEWAY_PORT:-11434}:8000"
    volumes:
      - ./workspace/llama/litellm_config.yaml:/app/config.yaml:ro
    networks:
      - ollama-local
      - ollama-bridge
    depends_on:
      llamacpp-router:
        condition: service_healthy
    restart: always
    command: ["--config", "/app/config.yaml", "--port", "8000", "--host", "0.0.0.0"]
